<aside
  class="h-full bg-white border-r border-gray-200 flex flex-col transition-all duration-300 ease-in-out overflow-hidden shadow-sm"
  [class.w-72]="!collapsed()"
  [class.w-12]="collapsed()"
>
  <!-- Header -->
  <div class="flex items-center justify-between px-3 py-4 border-b border-gray-100 min-h-14">
    @if (!collapsed()) {
      <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-widest pl-1">
        Documents
      </h2>
    }
    <button
      (click)="onToggle()"
      class="p-1.5 rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors shrink-0 cursor-pointer"
      [attr.aria-label]="collapsed() ? 'Expand sidebar' : 'Collapse sidebar'"
    >
      <svg
        class="w-4 h-4 transition-transform duration-300"
        [class.rotate-180]="collapsed()"
        fill="none" stroke="currentColor" viewBox="0 0 24 24"
      >
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </button>
  </div>

  <!-- Document List -->
  @if (!collapsed()) {
    <nav class="flex-1 overflow-y-auto py-2">
      <ul class="space-y-0.5 px-2">
        @for (doc of documents(); track doc.filename) {
          <li>
            <button
              (click)="selectDocument(doc)"
              class="w-full text-left px-3 py-2.5 rounded-lg text-sm transition-all duration-150 cursor-pointer"
              [class.bg-blue-50]="selectedFilename() === doc.filename"
              [class.text-blue-700]="selectedFilename() === doc.filename"
              [class.border-l-3]="selectedFilename() === doc.filename"
              [class.border-blue-600]="selectedFilename() === doc.filename"
              [class.font-medium]="selectedFilename() === doc.filename"
              [class.text-gray-600]="selectedFilename() !== doc.filename"
              [class.hover:bg-gray-50]="selectedFilename() !== doc.filename"
              [class.hover:text-gray-900]="selectedFilename() !== doc.filename"
            >
              <span class="block truncate">{{ doc.title }}</span>
            </button>
          </li>
        }
      </ul>
    </nav>
  }
</aside>
