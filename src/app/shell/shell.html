<div class="h-screen flex flex-col bg-gray-50">
  <!-- Top bar -->
  <header class="flex items-center justify-between px-4 py-2 bg-white border-b border-gray-200 shadow-sm shrink-0">
    <div class="flex items-center gap-3">
      <div class="flex items-center justify-center w-8 h-8 rounded-lg bg-blue-600">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
      </div>
      <h1 class="text-sm font-semibold text-gray-800">Document Viewer</h1>
    </div>
    <div class="flex items-center gap-4">
      <span class="text-xs text-gray-500">{{ username }}</span>
      <button
        (click)="logout()"
        class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-gray-600 hover:text-gray-900 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors cursor-pointer"
      >
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        Sign out
      </button>
    </div>
  </header>

  <!-- Main content -->
  <div class="flex flex-1 min-h-0">
    <app-sidebar
      [documents]="documents()"
      [selectedFilename]="selectedDoc()?.filename ?? null"
      [collapsed]="sidebarCollapsed()"
      (documentSelected)="onDocumentSelected($event)"
      (toggleCollapse)="onToggleSidebar()"
    ></app-sidebar>

    <main class="flex-1 min-w-0">
      <app-viewer
        [pdfSrc]="pdfSrc()"
        [title]="selectedDoc()?.title ?? null"
      ></app-viewer>
    </main>
  </div>
</div>
