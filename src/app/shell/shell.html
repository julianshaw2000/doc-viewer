<div class="h-screen flex flex-col bg-gray-50">
  <!-- Top bar -->
  <header class="flex items-center justify-between px-4 py-2 bg-white border-b border-gray-200 shadow-sm shrink-0">
    <div class="flex items-center gap-3">
      <button
        (click)="onShowIndex()"
        class="flex items-center gap-3 cursor-pointer hover:opacity-80 transition-opacity"
      >
        <div class="flex items-center justify-center w-8 h-8 rounded-lg bg-blue-600">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
        </div>
        <h1 class="text-sm font-semibold text-gray-800">Document Viewer</h1>
      </button>
    </div>
    <button
      (click)="logout()"
      class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-gray-600 hover:text-gray-900 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors cursor-pointer"
    >
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
      Sign out
    </button>
  </header>

  <!-- Main content -->
  <div class="flex flex-1 min-h-0">
    <app-sidebar
      [documents]="documents()"
      [selectedFilename]="selectedDoc()?.filename ?? null"
      [collapsed]="sidebarCollapsed()"
      (documentSelected)="onDocumentSelected($event)"
      (toggleCollapse)="onToggleSidebar()"
    ></app-sidebar>

    <main class="flex-1 min-w-0">
      @if (showIndex() && !pdfSrc()) {
        <!-- Index Page -->
        <div class="h-full overflow-y-auto">
          <div class="max-w-5xl mx-auto px-6 py-10 sm:px-8">
            <!-- Index Header -->
            <div class="mb-8">
              <h2 class="text-2xl font-bold text-gray-900 tracking-tight">Document Library</h2>
              <p class="mt-2 text-sm text-gray-500">{{ documents().length }} documents available. Select a document to view.</p>
            </div>

            <!-- Document Cards Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              @for (doc of documents(); track doc.filename) {
                <button
                  (click)="onDocumentSelected(doc)"
                  class="group text-left bg-white rounded-xl border border-gray-200 p-5 hover:border-blue-300 hover:shadow-md
                         transition-all duration-200 cursor-pointer"
                >
                  <div class="flex items-start gap-4">
                    <!-- PDF Icon -->
                    <div class="shrink-0 w-10 h-10 rounded-lg bg-red-50 flex items-center justify-center group-hover:bg-red-100 transition-colors">
                      <svg class="w-5 h-5 text-red-500" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 2l5 5h-5V4zm-2.5 9.5c0 .83-.67 1.5-1.5 1.5H8v2H6.5v-5H9c.83 0 1.5.67 1.5 1.5zm5-.5c0 1.38-1.12 2.5-2.5 2.5h-1v2h-1.5v-5H13c1.38 0 2.5 1.12 2.5 2.5zm4.5 0h-1.5v1h1v1.5h-1v2H17v-5h2.5v.5zM9 14H8v-1h1v1zm4 1h-1v-1.5h1c.55 0 1 .45 1 1s-.45.5-1 .5z"/>
                      </svg>
                    </div>
                    <!-- Content -->
                    <div class="flex-1 min-w-0">
                      <h3 class="text-sm font-semibold text-gray-900 group-hover:text-blue-700 transition-colors truncate">
                        {{ doc.title }}
                      </h3>
                      @if (doc.description) {
                        <p class="mt-1.5 text-xs text-gray-500 leading-relaxed line-clamp-2">
                          {{ doc.description }}
                        </p>
                      }
                      <div class="mt-3 flex items-center gap-1.5 text-xs text-blue-600 font-medium opacity-0 group-hover:opacity-100 transition-opacity">
                        <span>View document</span>
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg>
                      </div>
                    </div>
                  </div>
                </button>
              }
            </div>
          </div>
        </div>
      } @else {
        <app-viewer
          [pdfSrc]="pdfSrc()"
          [title]="selectedDoc()?.title ?? null"
        ></app-viewer>
      }
    </main>
  </div>
</div>
